# Prometheus scrape + rule + alertmanager config.
# Scrape sobre el puerto management (8181) de cada nodo, alcanzable solo en la
# red docker compose. El puerto no se publica al host (invariante de aislamiento
# entre socket de aplicacion y socket de management).

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    # Estampa de topologia: util cuando varios compose stacks escriben al mismo
    # TSDB de prod (federacion). En un unico stack de TFG es redundante pero no
    # estorba.
    cluster: node-local

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: node
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - "node1:8181"
          - "node2:8181"
          - "node3:8181"
        labels:
          application: node

  # Metadato del propio Prometheus para visualizar uptime del stack de observ.
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
