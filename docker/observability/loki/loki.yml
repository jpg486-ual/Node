# Loki single-binary monolitico (capa "hot" del incident response).
# Storage filesystem + retention 24h. Los logs antiguos siguen disponibles en el
# volume nodelogs N de cada nodo via logback rolling (default 30d, ver
# node.logging.retention-days). Para escalar a microservicios (read/write/index
# split) o object storage (S3/GCS/Azure), reescribir el bloque storage.

auth_enabled: false

server:
  http_listen_port: 3100
  log_level: info

common:
  path_prefix: /tmp/loki
  storage:
    filesystem:
      chunks_directory: /tmp/loki/chunks
      rules_directory: /tmp/loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2025-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 24h
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  # allow_structured_metadata controla si Promtail puede enviar fields
  # estructurados (Loki 3.0+). Dejamos `true` por defecto en 3.2.0 para
  # habilitar pivote desde Tempo via traceparent en el futuro; el
  # promtail.yml actual los emite como line-content con label policy
  # estricta (job/node/level).
  allow_structured_metadata: true

compactor:
  working_directory: /tmp/loki/compactor
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 50
  delete_request_store: filesystem
