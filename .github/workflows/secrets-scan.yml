name: Secrets Scan (Gitleaks)

# Secrets scanning bloqueante.
# Escanea working tree + historial completo con Gitleaks en cada push a main,
# y workflow_dispatch. Fail-closed ante cualquier hallazgo no
# allowlisted (ver .gitleaks.toml).

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: secrets-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Gitleaks (working tree + historial)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 es CRITICO. Gitleaks debe ver toda la historia,
          # no solo HEAD: un secreto introducido y borrado en un commit
          # anterior seguiria expuesto y tiene que detectarse.
          fetch-depth: 0

      # Install gitleaks con version fijada. No usamos gitleaks/gitleaks-action@v2
      # porque bundleaba una version antigua que ignora
      # silenciosamente la sintaxis plural `[[allowlists]]` de `.gitleaks.toml`
      # -- las entradas firmadas con paths regex no se aplicaban y el CI
      # reportaba findings que el scan local con gitleaks >= 8.23 no detectaba.
      # Pinneamos 8.30.1 La descarga es directa del release
      # oficial para reproducibilidad; cualquier bump se hace en este archivo.
      - name: Install Gitleaks 8.30.1
        run: |
          set -euo pipefail
          GITLEAKS_VERSION=8.30.1
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -fsSL -o /tmp/gitleaks.tar.gz "${url}"
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run Gitleaks detect
        # Salida: results.sarif + results.json. Fail-closed: exit 1 ante
        # cualquier hallazgo no allowlisted en la historia completa + working tree.
        # --redact evita que el secreto aparezca en los logs del run.
        run: |
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --report-path results.sarif \
            --report-format sarif \
            --redact \
            --no-banner

      - name: Upload Gitleaks SARIF artifact
        # Siempre se sube como artifact descargable, incluso cuando el upload
        # al tab Security esta gateado por SARIF_UPLOAD_ENABLED.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-sarif
          path: results.sarif
          if-no-files-found: ignore

      - name: Upload SARIF to GitHub Security
        # Gate uniforme SARIF_UPLOAD_ENABLED. Categoria gitleaks diferencia estos findings de los
        # de cve-scan, codeql y spotbugs en el triage.
        if: always() && vars.SARIF_UPLOAD_ENABLED == 'true'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
          category: gitleaks
