name: CodeQL (Java)

# Análisis estático puntual como complemento al SARIF
# de cve-scan. Cubre bugs + patrones problemáticos (code smells) vía las queries
# security-extended + security-and-quality. Report-only en esta iteración:
# los findings aparecen en el tab Security del repo para triage, no bloquean merge.

on:
  push:
    branches:
      - main
      - dev
    paths:
      - "src/**"
      - "pom.xml"
      - ".github/workflows/codeql.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL Analyze (Java)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Make Maven Wrapper Executable
        run: chmod +x ./mvnw

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java
          queries: security-extended,security-and-quality

      - name: Build (no tests)
        run: ./mvnw -B -DskipTests package

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:java"
          # Upload del SARIF al tab Security gated por SARIF_UPLOAD_ENABLED.
          upload: ${{ vars.SARIF_UPLOAD_ENABLED == 'true' && 'always' || 'never' }}
