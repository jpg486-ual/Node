# Defaults del perfil de producción
# Se activa con: --spring.profiles.active=prod

# El limitador de fallos del cliente queda desactivado por defecto en producción.
# Puede activarse durante incidentes sin redeploy sobrescribiendo variables de entorno.
node.client-failure-rate-limit.enabled=false
node.client-failure-rate-limit.max-failures=40
node.client-failure-rate-limit.window-seconds=60
node.client-failure-rate-limit.block-seconds=30
node.client-failure-rate-limit.count-server-errors=false

# Ubicación explícita del almacenamiento de contenido binario de los archivos del cliente
node.client-files.base-directory=./data/client-files
