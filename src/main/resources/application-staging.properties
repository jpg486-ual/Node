# Perfil staging: límites conservadores para las APIs cara cliente
# Se activa con: --spring.profiles.active=staging

# Limitador opcional del cliente basado en fallos (NO afecta al TTL de sesión)
node.client-failure-rate-limit.enabled=true
node.client-failure-rate-limit.max-failures=30
node.client-failure-rate-limit.window-seconds=60
node.client-failure-rate-limit.block-seconds=20
node.client-failure-rate-limit.count-server-errors=false

# Se mantiene explícita la ruta de almacenamiento de archivos cliente en este perfil
node.client-files.base-directory=./data/client-files
