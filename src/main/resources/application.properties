# =============================================================================
# Node — application.properties (perfil base)
# =============================================================================
# Defaults para dev standalone y como sustrato base de los profiles `staging`
# y `prod`. La filosofía es: defaults seguros + permisivos para arrancar el
# binario sin red, sin Postgres, sin claves; los profiles y el docker-compose
# inyectan la configuración real (datasource, identidad, topología, observabilidad).
#
# Convención de naming: kebab-case (`node.user-registration.code-ttl-minutes`).
# Spring relaxed-binding también acepta camelCase y SNAKE_CASE en env vars
# (`NODE_USER_REGISTRATION_CODE_TTL_MINUTES`). Ver docs/architecture/conventions.md.
# =============================================================================

spring.application.name=node


# -----------------------------------------------------------------------------
# Persistencia — modo y datasource
# -----------------------------------------------------------------------------
# Datos relacionales (sesiones, manifests, fragments, audit) se persisten en
# uno de dos modos: `memory` (tests/dev standalone, cero estado entre runs) o
# `postgres` (producción + multi-nodo). El switch lo lee
# `PersistenceConfiguration` y los adapters Postgres sólo se registran cuando
# el modo es `postgres` vía @ConditionalOnProperty.
node.persistence.mode=memory

# Datasource default H2 in-memory en modo de compatibilidad PostgreSQL — sirve
# tests y dev sin Docker. En producción el container/compose inyecta
# `SPRING_DATASOURCE_*` apuntando al Postgres real.
spring.datasource.url=jdbc:h2:mem:node;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate `validate`: prohibe auto-DDL — el schema lo controla Flyway desde
# `src/main/resources/db/migration/`. Cualquier cambio de schema va por una
# migration nueva (o reescritura pre-prod).
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true


# -----------------------------------------------------------------------------
# Logging — rotación, retención y niveles
# -----------------------------------------------------------------------------
# Pattern logback en `logback-spring.xml` con 7 fields MDC (request id, trace
# id, span id, session id, device id, http method, path). Promtail los
# extrae para Loki — si se altera el pattern hay que actualizar también
# `docker/observability/promtail/promtail.yml` (no hay test que lo enforce).
node.logging.directory=./logs
node.logging.archive-directory=./logs/archive
node.logging.file-name=node.log
node.logging.max-file-size=20MB
node.logging.retention-days=30
node.logging.total-size-cap=5GB
node.logging.level.root=INFO
node.logging.level.app=INFO


# -----------------------------------------------------------------------------
# Identidad criptográfica del nodo (P-256 ECDSA)
# -----------------------------------------------------------------------------
# Cada nodo posee un par EC P-256 (`SHA256withECDSA`) que firma sus requests
# inter-nodo y permite a peers verificar su identidad. `trusted-public-keys`
# es la lista de claves públicas (base64) cuyas firmas este nodo acepta —
# defensa default-deny: si está vacía, ninguna firma inter-nodo se valida.
# En docker-compose las claves se generan vía `docker/scripts/generate-node-keys.sh`.
node.identity.public-key-base64=
node.identity.private-key-base64=
node.identity.key-algorithm=EC
node.identity.trusted-public-keys=


# -----------------------------------------------------------------------------
# Validación de firma inter-nodo (replay + spoofing protection)
# -----------------------------------------------------------------------------
# Endpoints inter-nodo (`/ops`, `/custody/fragments`, `/recovery/*`,
# `/negotiate`, `/discovery`) exigen header `X-Signature` firmado
# sobre canonical `(method, path, query, nonce, timestamp)`. La ventana
# `signature-window-seconds` rechaza requests fuera de ±60s (replay defense).
# `excluded-path-patterns` lista los surfaces NO firmados — el cliente usa
# bearer token (`/auth /fs /files /sync`), `/admin` usa bearer + RBAC.
distributed.security.signature-window-seconds=60
distributed.security.default-signature-algorithm=SHA256withECDSA
distributed.security.allowed-signature-algorithms=SHA256withECDSA
distributed.security.excluded-path-patterns=/auth/**,/fs/**,/files/**,/sync/**


# -----------------------------------------------------------------------------
# Feature flags — composición de roles desde un solo binario
# -----------------------------------------------------------------------------
# Un mismo build sirve para roles distintos según qué módulos active. Los
# beans de cada módulo registran condicionalmente vía @ConditionalOnProperty.
# Defaults aquí representan el rol "miembro genérico de la red": discovery +
# negotiation + custody activos; recovery off (sólo se activa en tutores);
# custody-liveness off hasta calibración v1 cumplida.
node.features.discovery-enabled=true
node.features.negotiation-enabled=true
node.features.custody-enabled=true
node.features.recovery-enabled=false
# `negotiation-formal-enabled`: gatea la superficie HTTP `/negotiate/**` (admission control
# formal con persistencia de NegotiationAgreement). Default OFF: el flujo cliente productivo
# del modelo cerrado no la usa. El upload entra directo a `/custody/fragments` con
# agreementId sintético `client-upload-<UUID>`. Activar solo donde se quiera ejercitar el
# path formal.
node.features.negotiation-formal-enabled=false


# -----------------------------------------------------------------------------
# Topología y trust — tutor, supernodos, custodios
# -----------------------------------------------------------------------------
# `tutor-node-id` / `tutor-base-url`: nodo que mantiene los manifests +
# recovery orphans de este nodo (rol simétrico: cualquiera puede ser tutor de
# cualquiera). `discovery-supernodes`: nodos seed para bootstrap del overlay.
# `tutor-accepted-public-keys`: clientes (origins) cuyos manifests acepta este
# nodo cuando actúa de tutor. `accepted-fragment-sender-keys`:
# whitelist DISTINTA del tutor — peers cuyos fragmentos acepta este nodo en
# `POST /custody/fragments` (intercambio asimétrico). Default vacío = default-deny.
node.topology.tutorNodeId=
node.topology.tutorBaseUrl=
node.topology.discoverySupernodes=
node.topology.tutorAcceptedPublicKeys=
node.topology.acceptedFragmentSenderKeys=


# -----------------------------------------------------------------------------
# Capacidad y throughput de negociación (módulo negotiation)
# -----------------------------------------------------------------------------
# `bucket-max-ratio`: factor de overcommit sobre la cuota nominal (1.25 = 125%).
# `queue-window-seconds`: ventana sliding para la cola de negotiations
# entrantes. `max-concurrent-negotiations`: cap de agreements simultáneos
# in-flight (PENDING). `default-agreement-expiration`: TTL en segundos de un
# agreement sin confirmar antes de auto-CANCEL. `capacity.max-bytes`:
# capacidad bruta declarada del nodo en bytes (50 GiB).
node.bucket-max-ratio=1.25
node.queue-window-seconds=300
node.max-concurrent-negotiations=100
node.default-agreement-expiration=120
node.capacity.max-bytes=53687091200


# -----------------------------------------------------------------------------
# Distribución del contenido cliente (Reed-Solomon)
# -----------------------------------------------------------------------------
# Cuando `enabled=true`, los endpoints `PUT/GET /files/entries/{id}/content`
# dejan de usar el blob adapter local: `FileContentDistributionService` toma
# el control, encode RS por bloques (`block-size-bytes`, default 4 MiB),
# distribuye fragments firmados a los peers en `discovery-supernodes` y
# persiste manifest + placements en el origen. Cambiar n/k requiere
# coordinación cluster-wide; node-by-node corrompe la red.
#
# Peak RAM por upload concurrente = block_size × n × uploads_concurrentes,
# INDEPENDIENTE del tamaño del archivo. El cap antiguo de 10 MB era artefacto
# del RS clásico que cargaba el archivo entero en memoria; tras un cambio
# importante el pipeline procesa por bloques y `max-bytes=-1` significa sin cap
# aplicativo.
node.filesystem.distribution.enabled=false
node.filesystem.distribution.max-bytes=-1
node.reedsolomon.default-scheme.n=3
node.reedsolomon.default-scheme.k=2
node.reedsolomon.default-scheme.symbol-size=4096
node.reedsolomon.block-size-bytes=4194304

# Caps Spring/Tomcat retirados (-1 = ilimitado) para que el endpoint
# `PUT /files/entries/{id}/content` acepte bodies arbitrariamente grandes.
# El control real de tamaño lo hace `Content-Length` + `UserQuotaPort.tryReserve`
# en el orchestrator, no el container.
spring.servlet.multipart.max-file-size=-1
spring.servlet.multipart.max-request-size=-1
server.tomcat.max-swallow-size=-1
server.tomcat.max-http-form-post-size=-1


# -----------------------------------------------------------------------------
# Discovery — directorio de candidatos + retry de anuncios
# -----------------------------------------------------------------------------
# El módulo discovery mantiene un directorio (memoria o Postgres) con peers
# anunciados y sus métricas. `retry.*` configuran el worker que reintenta
# anuncios fallidos con backoff exponencial (`base-delay-seconds` →
# `max-delay-seconds`, capado por `max-attempts=0` = sin límite).
# `directory.freshness-seconds`: TTL antes de considerar un peer "stale".
# `supernode-role-enabled` (cambio importante): si true, el nodo carga la tabla local
# `discovery_candidate`, expone PUT/POST `/ops/discovery/candidates/{nodeId}` (registration),
# POST `/ops/discovery/query` (query inter-node, signed) y corre el cleanup periódico. Si
# false (default), el nodo NO mantiene tabla ni endpoints servidor, actúa sólo como cliente:
# se autoanuncia a los supernodos en `node.topology.discoverySupernodes` y consulta
# remotamente vía `SignedHttpRemoteDiscoveryQueryClient` con failover round-robin.
# El refactor invierte la presunción full-mesh: ahora el rol supernodo es opt-in explícito.
node.discovery.supernode-role-enabled=false
node.discovery.require-target-failure-domain=false
node.discovery.require-distribution-plan=false
# default-distribution-plan: propiedad del SUPERNODO. Plan que aplica el directorio si el
# origen NO trae plan propio en `DiscoveryRequest`. Sintaxis: "zone-a:1,zone-b:1,zone-c:1"
# (failureDomain prefix:count, separados por coma). Si quieres que el ORIGEN fuerce el plan
# en cada upload, usa `node.discovery.distribution-plan` (líneas más abajo) — esa
# tiene prioridad absoluta sobre este default.
node.discovery.default-distribution-plan=
node.discovery.retry.enabled=true
node.discovery.retry.fixed-delay-millis=5000
node.discovery.retry.batch-size=50
node.discovery.retry.base-delay-seconds=5
node.discovery.retry.max-delay-seconds=120
node.discovery.retry.max-attempts=0
node.discovery.retry.terminal-retention-seconds=86400
node.discovery.directory.freshness-seconds=300
node.discovery.directory.minimum-available-bytes=1

# -----------------------------------------------------------------------------
# Discovery — dynamic Discovery integration
# -----------------------------------------------------------------------------
# `self-register-enabled`: el origen se da de alta como candidato en TODOS los
# supernodos configurados (multi-supernodo replicado, no shard por zona).
# `local-base-url`: URL HTTP canonica de este nodo, persistida en el directorio
# del supernodo para que origines remotos puedan resolver discoveredNodeId →
# baseUrl sin consultar topology config (override en docker-compose vía env
# NODE_DISCOVERY_LOCAL_BASE_URL).
# Renewal: cada `interval-millis` el origen reanuncia su candidate. `initial-
# delay-millis` evita el doble registro en startup (el ApplicationReadyEvent ya
# corre el primer upsert).
# Cleanup: en supernodos, cada `interval-millis` se purgan filas con
# lastSeenAt < now - staleness-seconds. Es decoración (el filtro findActive ya
# las oculta), pero mantiene el row count acotado.
# distribution-plan: cuando no-blank, el origen FUERZA topología en cada query
# discover() (e.g. "zone-a:2,zone-b:2,zone-c:1"). Empty = sin restricción
# topológica, retry-with-bigger-request hasta max-retries.
# allow-self-candidate: Gap B intencional. true (default) deja que el origen
# custodie 1 fragment propio (cluster cerrado asimétrico, 1 hop menos).
# cache.ttl-seconds: cache TTL en origen para coalescer ráfagas de uploads.
node.discovery.self-register-enabled=false
node.discovery.local-base-url=
# `renewal.interval-millis` + `renewal.initial-delay-millis`: el SelfDiscoveryRegistrar
# es one-shot al ApplicationReadyEvent y best-effort por supernode (los failures se
# loggean WARN sin abortar). Si la registration inicial de un nodo falla en N supernodos
# (típico cuando arrancan en paralelo y aún no responden), el SelfDiscoveryRenewalWorker
# reintenta en cada tick. Defaults agresivos para que un cluster que arranque lento (CI
# Linux) converja al directory completo en pocos minutos sin esperar 5 min entre retries.
# Coste: 1 PUT signed por nodo cada 60s (despreciable). El cleanup worker mantiene
# `staleness-seconds=900` así que renewar cada 60s es 15× más conservador que necesario.
node.discovery.renewal.interval-millis=60000
node.discovery.renewal.initial-delay-millis=30000
node.discovery.cleanup.enabled=true
node.discovery.cleanup.interval-millis=3600000
node.discovery.cleanup.initial-delay-millis=60000
node.discovery.cleanup.staleness-seconds=900
node.discovery.requested-bucket=1024
node.discovery.ratio=1.0
node.discovery.distribution-plan=
node.discovery.max-retries=3
node.discovery.allow-self-candidate=true
node.discovery.cache.enabled=true
node.discovery.cache.ttl-seconds=30


# -----------------------------------------------------------------------------
# Fragment storage — peer-side custody TTL
# -----------------------------------------------------------------------------
# `default-custody-seconds`: TTL aplicado a las filas de `custody_fragment` cuando
# el origen no especifica `X-Custody-Seconds` en el deposit. Invariante validada
# al arranque por `CustodyLivenessStartupValidator`:
#     custody-liveness.base-interval-seconds
#         < custody-liveness.renewal-horizon-seconds
#         < fragmentstorage.default-custody-seconds
node.fragmentstorage.default-custody-seconds=600


# -----------------------------------------------------------------------------
# Recovery — orphan fragments tutor-side, restore mode, consistency worker
# -----------------------------------------------------------------------------
# `consistency.*`: worker periódico de reconciliación metadata-vs-payload. Tras la
# eliminación del TTL en `recovery_file_manifest` y `recovery_orphan_fragment`, el
# sweep `cleanupExpired` quedó retirado; sólo persiste la reconciliación
# metadata-without-payload.
node.recovery.payload-directory=./logs/recovery-payload
node.recovery.consistency.enabled=true
node.recovery.consistency.worker-fixed-delay-millis=30000
node.recovery.consistency.cleanup-batch-size=200
node.recovery.consistency.reconciliation-batch-size=200

# Startup recovery flow (modo RESTORE).
# `mode=NORMAL` (default) arranca como cualquier nodo. `mode=RESTORE` activa el bootstrap runner
# que pulla manifests del tutor y reconstruye fs_entry + client_file_manifest +
# client_fragment_placement local. `restore-strategy` decide qué hacer con los bytes:
#   METADATA_ONLY (default) — solo reconstruye catalog; descargas hacen reconstruct desde peers.
#   BYTES_FROM_TUTOR        — además, pulla bytes del tutor vía POST /recovery/fragments/reconstruct.
node.recovery.mode=NORMAL
node.recovery.restore-strategy=METADATA_ONLY

# `FileIntegrityRiskOrchestrator` política de integridad de archivos.
# Calcula `riskScore = (count(EN_RIESGO) * 0.5 + count(PERDIDO)) / n` por archivo en cada ciclo
# del worker (scheduled cada `integrity-check-interval-seconds`, default 60s). Cuando
# `riskScore >= recompose-threshold-fraction`:
#   - si `count(OK) >= recompose-min-healthy` (0 = usa `k` del manifest): re-upload total.
#   - si `count(OK) < recompose-min-healthy`: emite ADMIN_ALERT FILE_UNRECOVERABLE CRITICAL.
# El estado `OK / EN_RIESGO / PERDIDO` lo mantiene el `OriginInverseProbeService`.
node.recovery.recompose-threshold-fraction=0.34
node.recovery.recompose-min-healthy=0
node.recovery.integrity-check-interval-seconds=60


# -----------------------------------------------------------------------------
# Custody liveness — probing + escalation + risk scoring
# -----------------------------------------------------------------------------
# Worker que prueba periódicamente que cada peer custodian sigue almacenando
# los fragments comprometidos en cada agreement. Cuando un peer no responde
# tras `escalation-attempt-threshold` intentos consecutivos, se ejecuta la
# `escalation-policy` (default `KEEP_AND_ALERT`; alternativa: `RETURN_TO_TUTOR`,
# que mueve los fragments custody → recovery_orphan vía HTTP roundtrip al tutor
# del peer caído, separación física de dominios congelada).
#
# Los thresholds de risk-score (danger=70, emergency=85) son load-bearing:
# las Prometheus rules `NodeLivenessRiskDanger` / `NodeLivenessRiskEmergency`
# leen estos mismos valores. Cambiar uno sin el otro rompe la coherencia del
# alerting. La calibración inicial fue validada contra game day; cualquier
# recalibración debe acompañarse de su evidencia operativa.
#
# `base-interval-seconds=60` hace la probe 10× más rápida que
# `fragmentstorage.default-custody-seconds=600`, dando tiempo al renewal worker
# antes de que expire un fragment.
node.custody-liveness.enabled=false
node.custody-liveness.base-interval-seconds=60
node.custody-liveness.renewal-seconds=300
node.custody-liveness.renewal-horizon-seconds=120
node.custody-liveness.adaptive-intervals-enabled=false
node.custody-liveness.min-adaptive-interval-seconds=60
node.custody-liveness.max-adaptive-interval-seconds=3600
node.custody-liveness.high-load-fragment-threshold=10
node.custody-liveness.jitter-ratio=0.0
node.custody-liveness.batch-size=200
node.custody-liveness.fast-retry-interval-seconds=60
node.custody-liveness.max-fast-retries=10
node.custody-liveness.escalation-attempt-threshold=0
node.custody-liveness.reverse-probe-cooldown-seconds=1800
node.custody-liveness.escalation-policy=KEEP_AND_ALERT
node.custody-liveness.worker-fixed-delay-millis=5000
node.custody-liveness.request-timeout-millis=3000
# Cambio importante: TTL que se renueva en cada custody_fragment cuando el POST a
# /recovery/fragments del tutor falla (timeout / 4xx / 5xx no esperado). El peer NO borra su
# custody_fragment; el ciclo natural de probes (cada base-interval-seconds) re-disparará
# escalation. Cuando el tutor vuelva, el siguiente intento sucederá y el fragment migrará a
# recovery_orphan_fragment. Default 7200s (2h), coincide con el TTL custody. Override por
# compose para demos rápidas (e.g. 60s).
node.custody-liveness.escalation-ttl-renewal-seconds=7200


# -----------------------------------------------------------------------------
# User registration — invitación + sesión bearer
# -----------------------------------------------------------------------------
# Flow: el operador emite un código (CLI vía `console-issue-enabled` o seed
# Postgres) que el cliente canjea con `POST /auth/register`. La sesión se
# materializa en un bearer token de TTL `session-ttl-minutes` (default 7 días);
# `POST /auth/refresh` rota el token con TTL nuevo completo.
node.user-registration.code-length=8
node.user-registration.code-ttl-minutes=30
node.user-registration.session-ttl-minutes=10080
node.user-registration.console-issue-enabled=false
node.user-registration.console-exit-after-issue=true


# -----------------------------------------------------------------------------
# Storage local de blobs cliente (legacy fallback)
# -----------------------------------------------------------------------------
# Directorio donde el adapter `LocalDiskFsFileContentPort` materializa los
# blobs cliente cuando `node.filesystem.distribution.enabled=false`. En
# producción con distribución activa este path queda sin uso.
node.client-files.base-directory=./data/client-files


# -----------------------------------------------------------------------------
# Observability — actuator (Prometheus) + tracing (OTLP → Tempo)
# -----------------------------------------------------------------------------
# Puerto management aislado (8181) — invariante congelada por
# `ActuatorSocketIsolationIntegrationTest`: `/actuator/prometheus` NUNCA
# responde en el socket principal (`server.port`, default 8080) y los
# controllers de aplicación nunca aparecen en el management port.
#
# Tracing W3C + OTLP HTTP envía spans a Tempo en el docker-compose profile
# `observability`. Sampling default 0.1 (10%) para no quemar storage en prod;
# en dev `OTEL_TRACES_SAMPLER_ARG=1.0` captura todo. El SDK hace drop silente
# si el endpoint no responde, útil para arrancar dev sin el stack completo.
management.server.port=8181
management.server.address=0.0.0.0
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.prometheus.access=unrestricted
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=node
# node_id tag se inyecta exclusivamente vía env var MANAGEMENT_METRICS_TAGS_NODE_ID en
# docker-compose (fuente única). Si se redefine aquí con clave node_id, Spring Boot relaxed
# binding convierte la env var en management.metrics.tags.node.id (sep `_`→`.`), creando dos
# tags distintos (node_id literal + node.id) que Prometheus naming rules colapsan al mismo
# label `node_id` → "duplicate label name" durante el scrape.
management.tracing.enabled=true
management.tracing.sampling.probability=${OTEL_TRACES_SAMPLER_ARG:0.1}
management.otlp.tracing.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
management.otlp.tracing.transport=http
management.observations.key-values.application=node
# Idem: node_id en observations se inyecta vía env var, no aquí (mismo motivo).
